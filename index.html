<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Peak AI — By ANICADE Tech</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-wrap">
        <svg class="logo-svg" viewBox="0 0 40 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Scythe blade -->
          <path d="M20 2 L28 18 Q34 22 30 30 Q26 36 20 34 Q14 32 16 24 L20 2Z" fill="url(#blade)" stroke="#00FFD1" stroke-width="0.8"/>
          <!-- Scythe spine -->
          <line x1="20" y1="2" x2="20" y2="46" stroke="#00FFD1" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Guard -->
          <rect x="14" y="38" width="12" height="3" rx="1.5" fill="#00FFD1" opacity="0.8"/>
          <!-- Glow dot at tip -->
          <circle cx="20" cy="2" r="2" fill="#00FFD1"/>
          <defs>
            <linearGradient id="blade" x1="20" y1="2" x2="32" y2="34" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00FFD1"/>
              <stop offset="60%" stop-color="#0088FF" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#0044AA" stop-opacity="0.3"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-text">
          <span class="logo-name">Peak AI</span>
          <span class="logo-by">by ANICADE Tech</span>
        </div>
      </div>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>

    <div class="chat-list-label">Recent Chats</div>
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-footer">
      <span class="tag-pill">⚡ Coding Focus</span>
    </div>
  </aside>

  <!-- TOGGLE SIDEBAR BUTTON (mobile) -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <!-- MAIN CONTENT -->
  <main class="main" id="main">
    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="chat-title-display" id="chatTitleDisplay">New Chat</span>
      </div>
      <div class="topbar-right">
        <span class="status-dot"></span>
        <span class="status-label">Live</span>
      </div>
    </header>

    <!-- CHAT AREA -->
    <section class="chat-area" id="chatArea">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-logo">
          <svg class="hero-svg" viewBox="0 0 80 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M40 4 L56 36 Q68 44 60 60 Q52 72 40 68 Q28 64 32 48 L40 4Z" fill="url(#heroBlade)" stroke="#00FFD1" stroke-width="1.2"/>
            <line x1="40" y1="4" x2="40" y2="92" stroke="#00FFD1" stroke-width="3" stroke-linecap="round"/>
            <rect x="28" y="76" width="24" height="5" rx="2.5" fill="#00FFD1" opacity="0.9"/>
            <circle cx="40" cy="4" r="3.5" fill="#00FFD1"/>
            <defs>
              <linearGradient id="heroBlade" x1="40" y1="4" x2="64" y2="68" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#00FFD1"/>
                <stop offset="60%" stop-color="#0088FF" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#001133" stop-opacity="0.2"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="welcome-title">Peak <span class="accent">AI</span></h1>
        <p class="welcome-sub">Your real-time coding intelligence. Ask anything — get sharp, precise answers.</p>
        <div class="suggestion-grid">
          <button class="suggestion-card" data-q="Explain async/await in JavaScript with examples">
            <span class="s-icon">⚡</span>
            <span>Explain async/await in JavaScript</span>
          </button>
          <button class="suggestion-card" data-q="Write a Python REST API using FastAPI">
            <span class="s-icon">🐍</span>
            <span>Build a Python REST API</span>
          </button>
          <button class="suggestion-card" data-q="What are the latest trends in web development in 2025?">
            <span class="s-icon">🌐</span>
            <span>Latest web dev trends</span>
          </button>
          <button class="suggestion-card" data-q="Explain how Docker containers work">
            <span class="s-icon">🐳</span>
            <span>How Docker containers work</span>
          </button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
    </section>

    <!-- INPUT AREA -->
    <div class="input-wrap">
      <div class="input-box">
        <textarea id="userInput" placeholder="Ask Peak AI anything about coding, tech, science..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="input-hint">Peak AI uses live web search for real-time answers. Specialised in coding &amp; tech.</p>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <span>© ANICADE Tech. All rights reserved.</span>
      <span class="footer-sep">·</span>
      <span>Peak AI v1.0</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
